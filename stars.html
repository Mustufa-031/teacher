<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRAPHILE — Stellar Cartography</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#050510;--fg:#d0cec8;--muted:#4a4a5e;--accent:#d4a843;--teal:#2dd4bf;--card:rgba(8,8,20,0.92);--border:rgba(212,168,67,0.15);--glow:rgba(212,168,67,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;width:100vw;cursor:crosshair}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 1s,visibility 1s}
#loader.done{opacity:0;visibility:hidden}
.ld-ring{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:4px;text-transform:uppercase}
#crosshair{position:fixed;top:50%;left:50%;z-index:60;pointer-events:none;transform:translate(-50%,-50%)}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:var(--teal);opacity:.2}
#crosshair::before{width:1px;height:24px;left:50%;top:50%;transform:translate(-50%,-50%)}
#crosshair::after{width:24px;height:1px;left:50%;top:50%;transform:translate(-50%,-50%)}
.ch-dot{position:absolute;width:3px;height:3px;background:var(--teal);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.35}
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;pointer-events:none;background:linear-gradient(to bottom,rgba(5,5,16,0.7),transparent)}
header>*{pointer-events:auto}
.logo h1{font-weight:900;font-size:18px;letter-spacing:5px;color:var(--accent);text-transform:uppercase;display:inline}
.logo span{font-weight:200;font-size:10px;color:var(--muted);letter-spacing:2px;margin-left:10px}
.search-wrap{position:relative;width:240px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-family:'Outfit',sans-serif;font-size:12px;outline:none;backdrop-filter:blur(12px);transition:border-color .3s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px}
.sr-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:6px;backdrop-filter:blur(16px);max-height:220px;overflow-y:auto;display:none;z-index:200}
.sr-list.on{display:block}
.sr-item{padding:8px 12px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.sr-item:hover{background:rgba(212,168,67,0.08)}
.sr-item small{font-size:9px;padding:2px 6px;border-radius:20px;background:rgba(45,212,191,0.1);color:var(--teal);font-family:'Space Mono',monospace}
.ctrls{display:flex;gap:4px}
.cb{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;transition:all .3s;backdrop-filter:blur(12px)}
.cb:hover,.cb.on{color:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--glow)}
#tooltip{position:fixed;z-index:150;pointer-events:none;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;backdrop-filter:blur(16px);opacity:0;transition:opacity .15s;max-width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
#tooltip.show{opacity:1}
.tt-name{font-weight:700;font-size:14px;letter-spacing:1px;margin-bottom:4px;color:var(--accent)}
.tt-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--teal);margin-bottom:6px;letter-spacing:1px}
.tt-data{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-family:'Space Mono',monospace;font-size:10px}
.tt-data span{color:var(--muted)}
.tt-data b{color:var(--fg);font-weight:400}
.tt-note{font-size:11px;color:rgba(208,206,200,0.6);margin-top:6px;line-height:1.4;font-weight:300;border-top:1px solid var(--border);padding-top:6px}
#instruments{position:fixed;bottom:40px;left:20px;z-index:100;pointer-events:none;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:1.8}
#instruments b{color:var(--teal);font-weight:400}
#mag-slider{pointer-events:auto;width:100px;appearance:none;height:2px;background:var(--border);border-radius:2px;outline:none;vertical-align:middle;cursor:pointer}
#mag-slider::-webkit-slider-thumb{appearance:none;width:10px;height:10px;background:var(--teal);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--teal)}
#status-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:6px 20px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;pointer-events:none;background:linear-gradient(transparent,rgba(5,5,16,0.5))}
.coord{color:var(--teal)}
#info-panel{position:fixed;top:0;right:0;bottom:0;width:380px;z-index:90;background:var(--card);border-left:1px solid var(--border);backdrop-filter:blur(24px);transform:translateX(100%);transition:transform .5s cubic-bezier(.22,1,.36,1);overflow-y:auto}
#info-panel.open{transform:translateX(0)}
.ph{padding:24px 20px 16px;border-bottom:1px solid var(--border);position:relative}
.ph::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanl 2.5s ease-in-out infinite}
@keyframes scanl{0%,100%{opacity:.2}50%{opacity:1}}
.ph .x{position:absolute;top:16px;right:16px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:10px;transition:all .2s;background:transparent}
.ph .x:hover{color:var(--accent);border-color:var(--accent)}
.pn{font-size:24px;font-weight:800;letter-spacing:2px}
.pl{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin:2px 0 10px}
.pb{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-family:'Space Mono',monospace;letter-spacing:1px}
.b-s{background:rgba(45,212,191,0.1);color:var(--teal)}
.b-f{background:rgba(212,168,67,0.1);color:var(--accent)}
.b-a{background:rgba(208,206,200,0.04);color:var(--muted)}
.ps{padding:16px 20px;border-bottom:1px solid var(--border)}
.ps h3{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:600}
.ps p{font-size:13px;line-height:1.7;color:rgba(208,206,200,0.75);font-weight:300}
.st{width:100%;border-collapse:collapse}
.st th{text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:5px 0;font-weight:400;border-bottom:1px solid var(--border)}
.st td{padding:6px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.02);font-family:'Space Mono',monospace;vertical-align:top}
.st tr{transition:background .2s;cursor:default}
.st tr:hover{background:rgba(212,168,67,0.04)}
.sn{color:var(--fg);font-family:'Outfit',sans-serif;font-weight:500;font-size:12px}
.sno{font-size:9px;color:var(--muted);font-family:'Outfit',sans-serif;margin-top:1px;max-width:160px;line-height:1.3}
.sd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.vi{font-size:10px;color:rgba(208,206,200,0.5);font-family:'Space Mono',monospace}
#labels-c{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.clbl{position:absolute;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(212,168,67,0.4);white-space:nowrap;transform:translate(-50%,-50%);transition:all .3s}
.clbl.hl{text-shadow:0 0 8px var(--glow);color:var(--accent);font-size:9px}
#toast-c{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:6px}
.toast{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:11px;backdrop-filter:blur(16px);animation:tin .3s ease,tout .3s ease 2.5s forwards;white-space:nowrap;font-family:'Space Mono',monospace;letter-spacing:1px}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-8px)}}
@media(max-width:768px){
#info-panel{width:100%;top:auto;bottom:0;max-height:55vh;border-left:none;border-top:1px solid var(--border);transform:translateY(100%);border-radius:12px 12px 0 0}
#info-panel.open{transform:translateY(0)}
.search-wrap{width:160px}.logo span{display:none}
#instruments{bottom:44px;left:10px;font-size:9px}
}
</style>
</head>
<body>

<div id="loader"><div class="ld-ring"></div><div class="ld-text">Mapping stellar coordinates</div></div>
<div id="crosshair"><div class="ch-dot"></div></div>

<header>
  <div class="logo"><h1>Astraphile</h1><span>Stellar Cartography</span></div>
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="searchIn" placeholder="Search stars & patterns..." autocomplete="off">
    <div class="sr-list" id="srList"></div>
  </div>
  <div class="ctrls">
    <button class="cb" id="bLbl" title="Labels (L)"><i class="fas fa-tag"></i></button>
    <button class="cb" id="bGrid" title="Grid (G)"><i class="fas fa-border-all"></i></button>
    <button class="cb" id="bRot" title="Auto-rotate (R)"><i class="fas fa-sync-alt"></i></button>
    <button class="cb" id="bRand" title="Random (Space)"><i class="fas fa-dice"></i></button>
    <button class="cb" id="bHome" title="Reset (Esc)"><i class="fas fa-home"></i></button>
  </div>
</header>

<div id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-sub" id="ttSub"></div>
  <div class="tt-data" id="ttData"></div>
  <div class="tt-note" id="ttNote"></div>
</div>

<div id="instruments">
  FOV <b id="iFov">60.0</b>&deg;<br>
  MAG &le; <input type="range" id="mag-slider" min="0" max="8" step="0.5" value="7"> <b id="iMag">7.0</b><br>
  OBJ <b id="iObj">0</b>
</div>

<div id="info-panel">
  <div class="ph">
    <button class="x" id="closeP"><i class="fas fa-times"></i></button>
    <div class="pn" id="pName"></div>
    <div class="pl" id="pLatin"></div>
    <div class="pb" id="pBadges"></div>
  </div>
  <div class="ps"><h3>Mythology &amp; Context</h3><p id="pMyth"></p></div>
  <div class="ps"><h3>Catalogued Stars</h3>
    <table class="st"><thead><tr><th>Star</th><th>Mag</th><th>Dist</th><th>Class</th></tr></thead><tbody id="stBody"></tbody></table>
  </div>
  <div class="ps"><h3>Observation</h3><p class="vi" id="pView"></p></div>
</div>

<div id="status-bar">
  <span>RA <span class="coord" id="raD">00h 00m</span> &nbsp; DEC <span class="coord" id="decD">+00&deg; 00'</span></span>
  <span>Scroll to zoom &middot; Drag to rotate &middot; Click for details</span>
</div>

<div id="labels-c"></div>
<div id="toast-c"></div>
<div id="canvas-c" style="position:fixed;inset:0;z-index:1"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

      const d=ud.dso;
      document.getElementById('ttName').textContent=d[0];
      document.getElementById('ttSub').textContent=d[3].toUpperCase()+' \u00B7 '+d[4].toLocaleString()+' ly';
      document.getElementById('ttData').innerHTML=`<span>TYPE</span><b>${d[3]}</b><span>DIST</span><b>${d[4].toLocaleString()} ly</b>`;
      document.getElementById('ttNote').textContent=d[5];
    }else if(ud.isC!==undefined){
      const c=C[ud.ci];
      document.getElementById('ttName').textContent=c.n;
      document.getElementById('ttSub').textContent=c.l+' \u00B7 '+c.m;
      document.getElementById('ttData').innerHTML=`<span>AREA</span><b>${c.a} deg\u00B2</b><span>SEASON</span><b>${c.s}</b><span>FAMILY</span><b>${c.f}</b><span>STARS</span><b>${c.si.length}</b>`;
      document.getElementById('ttNote').textContent='Click to explore this pattern';
    }
    tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY+16)+'px';
    const tr=tip.getBoundingClientRect();
    if(tr.right>innerWidth)tip.style.left=(e.clientX-tr.width-16)+'px';
    if(tr.bottom>innerHeight)tip.style.top=(e.clientY-tr.height-16)+'px';
    tip.classList.add('show');ren.domElement.style.cursor='pointer';
  }else{
    tip.classList.remove('show');ren.domElement.style.cursor='crosshair';
  }
});

ren.domElement.addEventListener('click',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(getAllHitTargets(),false);
  if(hits.length>0){
    const ud=hits[0].object.userData;
    if(ud.isC!==undefined)selectConst(ud.ci);
  }
});

/* ====== SELECT CONSTELLATION ====== */
function selectConst(idx){
  selC=idx;const c=C[idx];
  lineObjs.forEach(({ci,mat})=>{mat.opacity=ci===idx?0.7:0.04});
  sprites.forEach(sp=>{
    const inC=c.si.includes(sp.userData.si);
    sp.material.opacity=inC?1:0.12;
  });
  const dir=c._cen.clone().normalize();
  flyTgt=dir.multiplyScalar(Math.min(zoomCur,75));
  isFly=true;ctrl.enabled=false;

  document.getElementById('pName').textContent=c.n;
  document.getElementById('pLatin').textContent=c.l+' \u2014 '+c.m;
  document.getElementById('pBadges').innerHTML=`<span class="badge b-s">${c.s}</span><span class="badge b-f">${c.f}</span><span class="badge b-a">${c.a} deg\u00B2</span>`;
  document.getElementById('pMyth').textContent=c.my;
  document.getElementById('pView').textContent='Best viewing: '+c.bv;
  const tb=document.getElementById('stBody');tb.innerHTML='';
  c.si.forEach(si=>{
    const s=S[si],col=sCol(s[5]);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="sd" style="background:${col};box-shadow:0 0 5px ${col}"></span><span class="sn">${s[0]}</span>${s[7]?`<div class="sno">${s[7]}</div>`:''}</td><td style="color:${s[3]<1.5?'var(--accent)':'var(--muted)'}">${s[3].toFixed(2)}</td><td>${s[4]}</td><td style="font-size:9px;color:var(--muted)">${s[5]}</td>`;
    tr.addEventListener('mouseenter',()=>{const sp=sprites.find(x=>x.userData.si===si);if(sp){sp.scale.setScalar(sp.userData.bs*2.5);hovStar=sp}});
    tr.addEventListener('mouseleave',()=>{if(hovStar){hovStar.scale.setScalar(hovStar.userData.bs);hovStar=null}});
    tb.appendChild(tr);
  });
  document.getElementById('info-panel').classList.add('open');
  toast('Navigating to '+c.n);
}

/* ====== LABELS ====== */
function updLabels(){
  lblEls.forEach(({el,pos,ci})=>{
    if(!showLbl){el.style.display='none';return}
    const v=pos.clone().project(cam);
    if(v.z>1){el.style.display='none';return}
    el.style.display='block';
    el.style.left=((v.x*.5+.5)*innerWidth)+'px';
    el.style.top=((-v.y*.5+.5)*innerHeight)+'px';
    el.classList.toggle('hl',selC===ci);
  });
}

/* ====== HUD ====== */
function updHUD(){
  const hFov=cam.fov*Math.PI/180;
  const hFovDeg=2*Math.atan(Math.tan(hFov/2)*(innerWidth/innerHeight))*180/Math.PI;
  document.getElementById('iFov').textContent=hFovDeg.toFixed(1);
  document.getElementById('iMag').textContent=magLim.toFixed(1);
  let vis=0;sprites.forEach(sp=>{if(sp.scale.x>0.1)vis++});
  document.getElementById('iObj').textContent=vis;
}

function updStatus(){
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const dec=Math.asin(Math.max(-1,Math.min(1,dir.y)))*180/Math.PI;
  let ra=Math.atan2(dir.x,dir.z)*180/Math.PI;if(ra<0)ra+=360;
  const rH=Math.floor(ra/15),rM=Math.floor((ra/15-rH)*60);
  const dS=dec>=0?'+':'-',dA=Math.abs(dec),dD=Math.floor(dA),dMn=Math.floor((dA-dD)*60);
  document.getElementById('raD').textContent=String(rH).padStart(2,'0')+'h '+String(rM).padStart(2,'0')+'m';
  document.getElementById('decD').textContent=dS+String(dD).padStart(2,'0')+'\u00B0 '+String(dMn).padStart(2,'0')+"'";
}

/* ====== MAGNITUDE FILTER ====== */
document.getElementById('mag-slider').addEventListener('input',function(){
  magLim=parseFloat(this.value);
  sprites.forEach(sp=>{
    const s=S[sp.userData.si];
    if(s[3]>magLim){sp.scale.setScalar(0);sp.material.opacity=0}
    else{const inSel=selC>=0&&C[selC].si.includes(sp.userData.si);sp.scale.setScalar(sp.userData.bs);sp.material.opacity=inSel?1:0.92}
  });
});

/* ====== SEARCH ====== */
const sIn=document.getElementById('searchIn'),sL=document.getElementById('srList');
function doSearch(){
  const q=sIn.value.toLowerCase().trim();
  if(!q){sL.classList.remove('on');return}
  const conH=C.map((c,i)=>({name:c.n,sub:c.m,type:'con',idx:i})).filter(x=>x.name.toLowerCase().includes(q)||x.sub.toLowerCase().includes(q));
  const starH=S.map((s,i)=>({name:s[0],sub:s[6]+' \u00B7 '+s[5],type:'star',idx:i})).filter(x=>x.name.toLowerCase().includes(q)||x.sub.toLowerCase().includes(q));
  const dsoH=DSO.map((d,i)=>({name:d[0],sub:d[3],type:'dso',idx:i})).filter(x=>x.name.toLowerCase().includes(q));
  const all=[...conH.slice(0,4),...starH.slice(0,6),...dsoH.slice(0,3)];
  if(!all.length){sL.classList.remove('on');return}
  sL.innerHTML=all.map(h=>`<div class="sr-item" data-type="${h.type}" data-idx="${h.idx}"><span>${h.name} <small style="font-size:10px;color:var(--muted)">${h.sub}</small></span><small>${h.type==='con'?'PATTERN':h.type==='dso'?'OBJECT':'STAR'}</small></div>`).join('');
  sL.classList.add('on');
  sL.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.type,i=parseInt(el.dataset.idx);
      if(t==='con')selectConst(i);
      else if(t==='star'){const s=S[i],pos=rd2v(s[1],s[2],R);flyTgt=pos.clone().normalize().multiplyScalar(55);isFly=true;ctrl.enabled=false;toast('Flying to '+s[0])}
      else if(t==='dso'){const d=DSO[i],pos=rd2v(d[1],d[2],R);flyTgt=pos.clone().normalize().multiplyScalar(60);isFly=true;ctrl.enabled=false;toast('Flying to '+d[0])}
      sL.classList.remove('on');sIn.value='';
    });
  });
}
sIn.addEventListener('input',doSearch);
sIn.addEventListener('blur',()=>setTimeout(()=>sL.classList.remove('on'),200));

/* ====== CONTROLS ====== */
document.getElementById('bLbl').addEventListener('click',function(){showLbl=!showLbl;this.classList.toggle('on',showLbl);toast(showLbl?'Labels enabled':'Labels hidden')});
document.getElementById('bGrid').addEventListener('click',function(){showGrd=!showGrd;gridGrp.visible=showGrd;this.classList.toggle('on',showGrd);toast(showGrd?'Grid shown':'Grid hidden')});
document.getElementById('bRot').addEventListener('click',function(){autoRot=!autoRot;this.classList.toggle('on',autoRot);toast(autoRot?'Auto-rotation on':'Auto-rotation off')});
document.getElementById('bRand').addEventListener('click',()=>{selectConst(Math.floor(Math.random()*C.length))});
document.getElementById('bHome').addEventListener('click',()=>{
  flyTgt=defCam.clone();isFly=true;ctrl.enabled=false;zoomTgt=150;
  selC=-1;document.getElementById('info-panel').classList.remove('open');
  lineObjs.forEach(({mat})=>{mat.opacity=0.28});
  sprites.forEach(sp=>{sp.material.opacity=0.92;const s=S[sp.userData.si];if(s[3]<=magLim)sp.scale.setScalar(sp.userData.bs)});
  toast('View reset');
});
document.getElementById('closeP').addEventListener('click',()=>{
  document.getElementById('info-panel').classList.remove('open');
  selC=-1;lineObjs.forEach(({mat})=>{mat.opacity=0.28});
  sprites.forEach(sp=>{sp.material.opacity=0.92});
});

/* ====== KEYBOARD ====== */
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='l'||e.key==='L')document.getElementById('bLbl').click();
  if(e.key==='g'||e.key==='G')document.getElementById('bGrid').click();
  if(e.key==='r'||e.key==='R')document.getElementById('bRot').click();
  if(e.key===' '){e.preventDefault();document.getElementById('bRand').click()}
  if(e.key==='Escape')document.getElementById('bHome').click();
});

/* ====== RESIZE ====== */
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

/* ====== ANIMATION ====== */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  bgM.uniforms.uTime.value=t;mwM.uniforms.uTime.value=t;

  /* Smooth zoom — very gentle interpolation */
  zoomCur=THREE.MathUtils.lerp(zoomCur,zoomTgt,0.035);

  if(isFly&&flyTgt){
    cam.position.lerp(flyTgt,0.03);
    cam.lookAt(0,0,0);
    if(cam.position.distanceTo(flyTgt)<0.15){isFly=false;ctrl.enabled=true;ctrl.update()}
  }else if(ctrl.enabled){
    ctrl.update();
    /* Enforce smooth zoom distance */
    const dir=cam.position.clone().normalize();
    cam.position.copy(dir.multiplyScalar(zoomCur));
    cam.lookAt(0,0,0);
  }

  if(autoRot&&!isFly&&ctrl.enabled){
    const p=cam.position.clone();
    p.applyAxisAngle(new THREE.Vector3(0,1,0),0.0005);
    cam.position.copy(p);cam.lookAt(0,0,0);
  }

  /* Star pulse */
  sprites.forEach(sp=>{
    if(sp===hovStar||sp.scale.x<0.1)return;
    const b=sp.userData.bs;
    sp.scale.setScalar(b*(1+Math.sin(t*2+sp.userData.si*1.3)*0.05));
  });

  /* DSO subtle pulse */
  dsoSprites.forEach((sp,i)=>{sp.material.opacity=0.35+Math.sin(t*0.5+i)*0.08});

  updLabels();updHUD();updStatus();
  ren.render(scene,cam);
}

/* ====== INIT ====== */
animate();
setTimeout(()=>document.getElementById('loader').classList.add('done'),1000);
toast('Scroll to zoom \u00B7 Drag to rotate \u00B7 Click patterns for details');
</script>
</body>
