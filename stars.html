<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRAPHILE — Stellar Cartography v2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#020208;--fg:#e0e0e0;--muted:#5a5a6e;--accent:#d4a843;--teal:#2dd4bf;--card:rgba(8,8,20,0.85);--border:rgba(212,168,67,0.2);--glow:rgba(212,168,67,0.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh;width:100vw;cursor:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 1s,visibility 1s}
#loader.done{opacity:0;visibility:hidden}
.ld-ring{width:50px;height:50px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;box-shadow:0 0 20px var(--glow)}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:4px;text-transform:uppercase}
#cursor{position:fixed;top:0;left:0;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:screen}
#c-ring{width:30px;height:30px;border:1px solid var(--teal);border-radius:50%;opacity:0.5;transition:all 0.2s}
#c-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:var(--teal);border-radius:50%;transform:translate(-50%,-50%)}
#cursor.hover #c-ring{width:50px;height:50px;border-color:var(--accent);opacity:0.8}

/* Header & Navigation */
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;pointer-events:none;background:linear-gradient(to bottom,rgba(2,2,8,0.9),transparent)}
header>*{pointer-events:auto}
.left-group{display:flex;align-items:center;gap:24px}
.logo h1{font-weight:800;font-size:18px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;display:inline;text-shadow:0 0 10px var(--glow)}
.logo span{font-weight:300;font-size:10px;color:var(--muted);letter-spacing:2px;margin-left:12px}

.nav-menu{display:flex;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:4px;backdrop-filter:blur(12px);gap:4px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.nav-menu a{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:7px 16px;border-radius:20px;display:flex;align-items:center;gap:8px;transition:all .3s}
.nav-menu a:hover{color:var(--teal);background:rgba(45,212,191,0.1);box-shadow:0 0 10px rgba(45,212,191,0.2)}
.nav-menu a i{font-size:11px}

.ctrls{display:flex;gap:6px}
.cb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:12px;transition:all .3s;backdrop-filter:blur(12px)}
.cb:hover,.cb.on{color:var(--accent);border-color:var(--accent);box-shadow:0 0 12px var(--glow);background:rgba(212,168,67,0.1)}

#tooltip{position:fixed;z-index:150;pointer-events:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;backdrop-filter:blur(20px);opacity:0;transition:opacity .15s;max-width:300px;box-shadow:0 4px 30px rgba(0,0,0,0.7)}
#tooltip.show{opacity:1}
.tt-name{font-weight:700;font-size:15px;letter-spacing:1px;margin-bottom:4px;color:var(--accent)}
.tt-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--teal);margin-bottom:8px;letter-spacing:1px}
.tt-data{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;font-family:'Space Mono',monospace;font-size:10px;margin-bottom:8px}
.tt-data span{color:var(--muted)}
.tt-data b{color:var(--fg);font-weight:400}
.tt-note{font-size:11px;color:rgba(208,206,200,0.7);margin-top:6px;line-height:1.4;font-weight:300;border-top:1px solid var(--border);padding-top:8px}
#instruments{position:fixed;bottom:50px;left:24px;z-index:100;pointer-events:none;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;line-height:1.8}
#instruments b{color:var(--teal);font-weight:400}
#mag-slider{pointer-events:auto;width:120px;appearance:none;height:2px;background:var(--border);border-radius:2px;outline:none;vertical-align:middle;cursor:pointer}
#mag-slider::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--teal);border-radius:50%;cursor:pointer;box-shadow:0 0 8px var(--teal)}
#status-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;pointer-events:none;background:linear-gradient(transparent,rgba(2,2,8,0.8))}
.coord{color:var(--teal);font-weight:700}
#info-panel{position:fixed;top:0;right:0;bottom:0;width:400px;z-index:90;background:var(--card);border-left:1px solid var(--border);backdrop-filter:blur(24px);transform:translateX(100%);transition:transform .6s cubic-bezier(.22,1,.36,1);overflow-y:auto;box-shadow:-10px 0 40px rgba(0,0,0,0.5)}
#info-panel.open{transform:translateX(0)}
.ph{padding:30px 24px 20px;border-bottom:1px solid var(--border);position:relative}
.ph::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanl 3s ease-in-out infinite}
@keyframes scanl{0%,100%{opacity:.2}50%{opacity:1}}
.ph .x{position:absolute;top:20px;right:20px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:12px;transition:all .2s;background:transparent}
.ph .x:hover{color:var(--accent);border-color:var(--accent);transform:rotate(90deg)}
.pn{font-size:28px;font-weight:800;letter-spacing:2px;text-shadow:0 0 15px rgba(212,168,67,0.3)}
.pl{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin:4px 0 12px}
.pb{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:9px;padding:3px 10px;border-radius:20px;font-family:'Space Mono',monospace;letter-spacing:1px;border:1px solid currentColor}
.b-s{color:var(--teal);background:rgba(45,212,191,0.05)}
.b-f{color:var(--accent);background:rgba(212,168,67,0.05)}
.b-a{color:var(--muted);background:rgba(255,255,255,0.02)}
.ps{padding:20px 24px;border-bottom:1px solid var(--border)}
.ps h3{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;font-weight:600}
.ps p{font-size:13px;line-height:1.8;color:rgba(208,206,200,0.8);font-weight:300}
.st{width:100%;border-collapse:collapse}
.st th{text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 0;font-weight:400;border-bottom:1px solid var(--border)}
.st td{padding:8px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03);font-family:'Space Mono',monospace;vertical-align:top}
.st tr{transition:background .2s;cursor:pointer}
.st tr:hover{background:rgba(212,168,67,0.05)}
.sn{color:var(--fg);font-family:'Outfit',sans-serif;font-weight:500;font-size:13px}
.sno{font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif;margin-top:2px;max-width:180px;line-height:1.3}
.sd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;box-shadow:0 0 6px currentColor}
.vi{font-size:11px;color:rgba(208,206,200,0.6);font-family:'Space Mono',monospace}
#labels-c{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.clbl{position:absolute;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(212,168,67,0.5);white-space:nowrap;transform:translate(-50%,-50%);transition:all .3s;text-shadow:0 0 4px rgba(0,0,0,0.8)}
.clbl.hl{text-shadow:0 0 10px var(--glow);color:var(--accent);font-size:10px}
#toast-c{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px}
.toast{padding:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:11px;backdrop-filter:blur(20px);animation:tin .3s ease,tout .3s ease 2.5s forwards;white-space:nowrap;font-family:'Space Mono',monospace;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-10px)}}
@media(max-width:768px){
#info-panel{width:100%;top:auto;bottom:0;max-height:60vh;border-left:none;border-top:1px solid var(--border);transform:translateY(100%);border-radius:12px 12px 0 0}
#info-panel.open{transform:translateY(0)}
.logo span{display:none}
.left-group{gap:10px}
.nav-menu a span{display:none}
.nav-menu a{padding:8px 10px}
#instruments{bottom:50px;left:12px;font-size:9px}
header{padding:12px}
}
</style>
</head>

<div id="loader"><div class="ld-ring"></div><div class="ld-text">Calibrating Stellar Matrix</div></div>
<div id="cursor"><div id="c-ring"></div><div id="c-dot"></div></div>

<header>
  <div class="left-group">
    <div class="logo"><h1>Astrophile</h1><span>Stellar Cartography v2</span></div>
    <nav class="nav-menu">
      <a href="index.html"><i class="fas fa-house-user"></i><span>Home</span></a>
      <a href="solarsystem.html"><i class="fas fa-sun"></i><span>Solar System</span></a>
    </nav>
  </div>
  <div class="ctrls">
    <button class="cb" id="bGrid" title="Grid (G)"><i class="fas fa-border-all"></i></button>
    <button class="cb" id="bRot" title="Auto-rotate (R)"><i class="fas fa-sync-alt"></i></button>
    <button class="cb" id="bHome" title="Reset View (Esc)"><i class="fas fa-home"></i></button>
  </div>
</header>

<div id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-sub" id="ttSub"></div>
  <div class="tt-data" id="ttData"></div>
  <div class="tt-note" id="ttNote"></div>
</div>

<div id="instruments">

  OBJ <b id="iObj">0</b>
</div>

<div id="info-panel">
  <div class="ph">
    <button class="x" id="closeP"><i class="fas fa-times"></i></button>
    <div class="pn" id="pName"></div>
    <div class="pl" id="pLatin"></div>
    <div class="pb" id="pBadges"></div>
  </div>
  <div class="ps"><h3>Mythology &amp; Context</h3><p id="pMyth"></p></div>
  <div class="ps"><h3>Catalogued Stars</h3>
    <table class="st"><thead><tr><th>Star</th><th>Mag</th><th>Dist</th><th>Class</th></tr></thead><tbody id="stBody"></tbody></table>
  </div>
  <div class="ps"><h3>Observation Notes</h3><p class="vi" id="pView"></p></div>
</div>

<div id="status-bar">
  <span>RA <span class="coord" id="raD">00h 00m</span> &nbsp; DEC <span class="coord" id="decD">+00&deg; 00'</span></span>
  <span>Scroll to zoom &middot; Drag to rotate &middot; Click for details</span>
</div>

<div id="labels-c"></div>
<div id="toast-c"></div>
<div id="canvas-c" style="position:fixed;inset:0;z-index:1"></div>

}

/* ====== NAMED STARS (Physical Shader with Diffraction Spikes) ====== */
const starVS = `
  attribute float aSize;
  attribute vec3 aColor;
  varying vec3 vColor;
  void main() {
    vColor = aColor;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (350.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;
const starFS = `
  varying vec3 vColor;
  void main() {
    vec2 uv = gl_PointCoord - 0.5;
    float dist = length(uv);
    if (dist > 0.5) discard;
    
    // Core
    float core = 1.0 - smoothstep(0.0, 0.1, dist);
    
    // Glow
    float glow = 1.0 - smoothstep(0.0, 0.5, dist);
    glow = pow(glow, 2.0);
    
    // Diffraction Spikes
    float spikeX = 1.0 - smoothstep(0.0, 0.5, abs(uv.x));
    float spikeY = 1.0 - smoothstep(0.0, 0.5, abs(uv.y));
    spikeX = pow(spikeX, 8.0) * (1.0 - smoothstep(0.0, 0.05, abs(uv.y)));
    spikeY = pow(spikeY, 8.0) * (1.0 - smoothstep(0.0, 0.05, abs(uv.x)));
    float spikes = max(spikeX, spikeY) * 0.5;
    
    float alpha = core + glow * 0.6 + spikes;
    gl_FragColor = vec4(vColor, alpha);
  }
`;

/* ====== DEEP SKY OBJECTS (Volumetric) ====== */
DSO.forEach(d=>{
  const pos=rd2v(d[1],d[2],R*0.97);
  const colMap = {diffuse: 0xff6644, galaxy: 0x8899ff, cluster: 0xaaff88, globular: 0xffcc88, planetary: 0x66ffcc};
  const col = colMap[d[3]] || 0xffffff;
  
  const cv=document.createElement('canvas');cv.width=128;cv.height=128;
  const ctx=cv.getContext('2d');
  
  // Procedural Noise for DSO
  for(let i=0; i<500; i++) {
    const x = 64 + (Math.random()-0.5) * 80 * Math.random();
    const y = 64 + (Math.random()-0.5) * 80 * Math.random();
    const r = 2 + Math.random() * 8;
    const a = Math.random() * 0.1;
    ctx.fillStyle = `rgba(${(col>>16)&255},${(col>>8)&255},${col&255},${a})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Central Glow
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,`rgba(${(col>>16)&255},${(col>>8)&255},${col&255},0.8)`);
  g.addColorStop(0.2,`rgba(${(col>>16)&255},${(col>>8)&255},${col&255},0.3)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  
  const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.65,blending:THREE.AdditiveBlending,depthWrite:false});
  const sp=new THREE.Sprite(mat);sp.position.copy(pos);
  sp.scale.setScalar(d[3]==='galaxy'?12:8);
  sp.userData={dso:d};scene.add(sp);dsoSprites.push(sp);

  const hg=new THREE.SphereGeometry(6,8,8);
  const hm=new THREE.MeshBasicMaterial({visible:false});
  const hMesh=new THREE.Mesh(hg,hm);hMesh.position.copy(pos);
  hMesh.userData={dso:d};scene.add(hMesh);sp._hit=hMesh;
});

/* ====== INTERACTION ====== */
const ray=new THREE.Raycaster();ray.params.Sprite={threshold:0};
const mouse=new THREE.Vector2();
const tip=document.getElementById('tooltip');
const cursor=document.getElementById('cursor');

function getTargets(){const t=[];C.forEach(c=>t.push(c._hit));dsoSprites.forEach(sp=>t.push(sp._hit));return t}

ren.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
  
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(getTargets(),false);
  
  if(hits.length>0){
    const ud=hits[0].object.userData;
    if(ud.dso){
      const d=ud.dso;
      document.getElementById('ttName').textContent=d[0];
      document.getElementById('ttSub').textContent=d[3].toUpperCase()+' \u00B7 '+d[4].toLocaleString()+' ly';
      document.getElementById('ttData').innerHTML=`<span>TYPE</span><b>${d[3]}</b><span>DIST</span><b>${d[4].toLocaleString()} ly</b>`;
      document.getElementById('ttNote').textContent=d[5];
    }else if(ud.isC!==undefined){
      const c=C[ud.ci];
      document.getElementById('ttName').textContent=c.n;
      document.getElementById('ttSub').textContent=c.l+' \u00B7 '+c.m;
      document.getElementById('ttData').innerHTML=`<span>AREA</span><b>${c.a} deg\u00B2</b><span>SEASON</span><b>${c.s}</b><span>FAMILY</span><b>${c.f}</b><span>STARS</span><b>${c.si.length}</b>`;
      document.getElementById('ttNote').textContent='Click to explore this pattern';
    }
    tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY+16)+'px';
    const tr=tip.getBoundingClientRect();
    if(tr.right>innerWidth)tip.style.left=(e.clientX-tr.width-16)+'px';
    if(tr.bottom>innerHeight)tip.style.top=(e.clientY-tr.height-16)+'px';
    tip.classList.add('show');
    cursor.classList.add('hover');
  }else{
    tip.classList.remove('show');
    cursor.classList.remove('hover');
  }
});

ren.domElement.addEventListener('click',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObjects(getTargets(),false);
  if(hits.length>0){
    const ud=hits[0].object.userData;
    if(ud.isC!==undefined)selectConst(ud.ci);
  }
});

function selectConst(idx){
  selC=idx;const c=C[idx];
  lineObjs.forEach(({ci,mat})=>{mat.opacity=ci===idx?0.8:0.02;mat.color.setHex(ci===idx?0xffffff:0xd4a843)});
  sprites.forEach(sp=>{sp.material.opacity=c.si.includes(sp.userData.si)?1:0.1});
  
  const dir=c._cen.clone().normalize();
  flyTgt=dir.multiplyScalar(60);
  flyFov = 45;
  isFly=true;ctrl.enabled=false;

  document.getElementById('pName').textContent=c.n;
  document.getElementById('pLatin').textContent=c.l+' \u2014 '+c.m;
  document.getElementById('pBadges').innerHTML=`<span class="badge b-s">${c.s}</span><span class="badge b-f">${c.f}</span><span class="badge b-a">${c.a} deg\u00B2</span>`;
  document.getElementById('pMyth').textContent=c.my;
  document.getElementById('pView').textContent='Best viewing: '+c.bv;
  const tb=document.getElementById('stBody');tb.innerHTML='';
  
  c.si.forEach(si=>{
    const s=S[si],col=sCol(s[5]);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="sd" style="background:${col.getStyle()};color:${col.getStyle()}"></span><span class="sn">${s[0]}</span>${s[7]?`<div class="sno">${s[7]}</div>`:''}</td><td style="color:${s[3]<1.5?'var(--accent)':'var(--muted)'}">${s[3].toFixed(2)}</td><td>${s[4]}</td><td style="font-size:9px;color:var(--muted)">${s[5]}</td>`;
    tr.addEventListener('mouseenter',()=>{const sp=sprites.find(x=>x.userData.si===si);if(sp){sp.scale.setScalar(sp.userData.bs*2.5);hovStar=sp}});
    tr.addEventListener('mouseleave',()=>{if(hovStar){hovStar.scale.setScalar(hovStar.userData.bs);hovStar=null}});
    tb.appendChild(tr);
  });
  document.getElementById('info-panel').classList.add('open');
  toast('Navigating to '+c.n);
}

function updLabels(){
  lblEls.forEach(({el,pos,ci})=>{
    if(!showLbl){el.style.display='none';return}
    const v=pos.clone().project(cam);
    if(v.z>1){el.style.display='none';return}
    el.style.display='block';
    el.style.left=((v.x*.5+.5)*innerWidth)+'px';
    el.style.top=((-v.y*.5+.5)*innerHeight)+'px';
    el.classList.toggle('hl',selC===ci);
  });
}

function updHUD(){
  const hFov=cam.fov*Math.PI/180;
  const hFovDeg=2*Math.atan(Math.tan(hFov/2)*(innerWidth/innerHeight))*180/Math.PI;
  document.getElementById('iFov').textContent=hFovDeg.toFixed(1);
  document.getElementById('iMag').textContent=magLim.toFixed(1);
  let vis=0;sprites.forEach(sp=>{if(sp.scale.x>0.1)vis++});
  document.getElementById('iObj').textContent=vis;
}

function updStatus(){
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const dec=Math.asin(Math.max(-1,Math.min(1,dir.y)))*180/Math.PI;
  let ra=Math.atan2(dir.x,dir.z)*180/Math.PI;if(ra<0)ra+=360;
  const rH=Math.floor(ra/15),rM=Math.floor((ra/15-rH)*60);
  const dS=dec>=0?'+':'-',dA=Math.abs(dec),dD=Math.floor(dA),dMn=Math.floor((dA-dD)*60);
  document.getElementById('raD').textContent=String(rH).padStart(2,'0')+'h '+String(rM).padStart(2,'0')+'m';
  document.getElementById('decD').textContent=dS+String(dD).padStart(2,'0')+'\u00B0 '+String(dMn).padStart(2,'0')+"'";
}

document.getElementById('mag-slider').addEventListener('input',function(){
  magLim=parseFloat(this.value);
  sprites.forEach(sp=>{
    const s=S[sp.userData.si];
    if(s[3]>magLim){sp.scale.setScalar(0);sp.material.opacity=0}
    else{const inSel=selC>=0&&C[selC].si.includes(sp.userData.si);sp.scale.setScalar(sp.userData.bs);sp.material.opacity=inSel?1:0.7}
  });
});

document.getElementById('bGrid').addEventListener('click',function(){showGrd=!showGrd;gridGrp.visible=showGrd;this.classList.toggle('on',showGrd)});
document.getElementById('bRot').addEventListener('click',function(){autoRot=!autoRot;this.classList.toggle('on',autoRot)});
document.getElementById('bHome').addEventListener('click',()=>{
  flyTgt=defCam.clone();flyFov=60;isFly=true;ctrl.enabled=false;zoomTgt=150;
  selC=-1;document.getElementById('info-panel').classList.remove('open');
  lineObjs.forEach(({mat})=>{mat.opacity=0.15;mat.color.setHex(0xd4a843)});
  sprites.forEach(sp=>{sp.material.opacity=0.7;const s=S[sp.userData.si];if(s[3]<=magLim)sp.scale.setScalar(sp.userData.bs)});
  toast('View reset');
});
document.getElementById('closeP').addEventListener('click',()=>{
  document.getElementById('info-panel').classList.remove('open');
  selC=-1;lineObjs.forEach(({mat})=>{mat.opacity=0.15;mat.color.setHex(0xd4a843)});
  sprites.forEach(sp=>{sp.material.opacity=0.7});
});

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='g'||e.key==='G')document.getElementById('bGrid').click();
  if(e.key==='r'||e.key==='R')document.getElementById('bRot').click();
  if(e.key==='Escape')document.getElementById('bHome').click();
});

window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

/* ====== ANIMATION LOOP ====== */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  bgM.uniforms.uTime.value=t;mwM.uniforms.uTime.value=t;

  zoomCur=THREE.MathUtils.lerp(zoomCur,zoomTgt,0.05);
  cam.fov = THREE.MathUtils.lerp(cam.fov, flyFov, 0.05);
  cam.updateProjectionMatrix();

  if(isFly&&flyTgt){
    cam.position.lerp(flyTgt,0.04);
    cam.lookAt(0,0,0);
    if(cam.position.distanceTo(flyTgt)<0.5){isFly=false;ctrl.enabled=true;ctrl.update()}
  }else if(ctrl.enabled){
    ctrl.update();
    const dir=cam.position.clone().normalize();
    cam.position.copy(dir.multiplyScalar(zoomCur));
    cam.lookAt(0,0,0);
  }

  if(autoRot&&!isFly&&ctrl.enabled){
    const p=cam.position.clone();
    p.applyAxisAngle(new THREE.Vector3(0,1,0),0.0005);
    cam.position.copy(p);cam.lookAt(0,0,0);
  }

  sprites.forEach(sp=>{
    if(sp===hovStar||sp.scale.x<0.1)return;
    const b=sp.userData.bs;
    sp.scale.setScalar(b*(1+Math.sin(t*2+sp.userData.si*1.3)*0.08));
  });

  dsoSprites.forEach((sp,i)=>{sp.material.opacity=0.55+Math.sin(t*0.5+i)*0.1});

  updLabels();updHUD();updStatus();
  ren.render(scene,cam);
}

animate();
setTimeout(()=>document.getElementById('loader').classList.add('done'),1200);
toast('Welcome to Stellar Cartography v2');
</script>
</body>
</html>
