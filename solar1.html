<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Structural Analysis System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#050508;--card:rgba(10,12,20,0.93);--border:rgba(190,165,90,0.15);--accent:#C8A84E;--accent2:#a08030;--text:#D4CFC4;--muted:#6E6A5E;--glow:rgba(200,168,78,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%)}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
.spin-ring{width:48px;height:48px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{margin-top:16px;color:var(--muted);font-size:11px;letter-spacing:4px;font-weight:300}
#app{opacity:0;transition:opacity .6s ease;position:relative;z-index:2;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);z-index:100;flex-shrink:0;gap:12px;flex-wrap:wrap}
.logo{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);white-space:nowrap}
.logo span{font-weight:300;color:var(--muted);font-size:11px;margin-left:8px;letter-spacing:1px}
.hdr-center{display:flex;align-items:center;gap:10px}
#eraSelect{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;outline:none;min-width:140px}
#eraSelect option{background:#0a0c14;color:var(--text)}
.hdr-right{display:flex;gap:6px}
.mode-btn{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .25s;letter-spacing:.5px;font-weight:500}
.mode-btn:hover{border-color:var(--accent);color:var(--text)}
.mode-btn.active{background:rgba(200,168,78,0.1);border-color:var(--accent);color:var(--accent)}
#eraInfo{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 24px;max-width:520px;text-align:center;z-index:200;backdrop-filter:blur(16px);transition:all .4s cubic-bezier(.4,0,.2,1)}
#eraInfo.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(-10px)}
#eraInfo h3{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:2px}
#eraInfo .period{font-size:11px;color:var(--muted);margin-bottom:8px}
#eraInfo p{font-size:12px;line-height:1.6;color:var(--text);font-weight:300}
#sidebar{position:fixed;left:0;top:52px;bottom:80px;width:220px;background:var(--card);border-right:1px solid var(--border);backdrop-filter:blur(16px);z-index:90;overflow-y:auto;padding:16px 12px;transition:transform .35s cubic-bezier(.4,0,.2,1);scrollbar-width:thin;scrollbar-color:var(--accent2) transparent}
#sidebar.hidden{transform:translateX(-100%)}
.sb-section{margin-bottom:18px}
.sb-section h4{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .2s;font-size:12px;font-weight:400}
.sb-item:hover{background:rgba(255,255,255,0.04)}
.sb-item.active{background:rgba(200,168,78,0.08)}
.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb-range{font-size:10px;color:var(--muted);margin-left:auto}
#detailPanel{position:fixed;right:0;top:52px;bottom:0;width:340px;background:var(--card);border-left:1px solid var(--border);backdrop-filter:blur(16px);z-index:150;overflow-y:auto;padding:20px;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);scrollbar-width:thin;scrollbar-color:var(--accent2) transparent}
#detailPanel.open{transform:translateX(0)}
.dp-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .2s}
.dp-close:hover{color:var(--text)}
#detailPanel h2{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:2px;padding-right:30px}
#detailPanel .dp-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.dp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px}
.dp-row .label{color:var(--muted);font-weight:400}
.dp-row .value{color:var(--text);font-weight:500;text-align:right;max-width:180px}
.dp-desc{font-size:12px;line-height:1.7;color:var(--text);margin:14px 0;font-weight:300;opacity:.85}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px}
.dp-tag{background:rgba(200,168,78,0.08);border:1px solid rgba(200,168,78,0.15);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500}
#uvLegend{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 20px;display:flex;align-items:center;gap:16px;z-index:200;backdrop-filter:blur(12px);transition:all .35s}
#uvLegend.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(10px)}
.uv-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500}
.uv-swatch{width:10px;height:10px;border-radius:50%}
.uv-blocked{text-decoration:line-through;opacity:.6}
.uv-pct{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.5px}
#eventBar{position:fixed;bottom:0;left:0;right:0;height:68px;background:var(--card);border-top:1px solid var(--border);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--accent2) transparent}
#eventBar::-webkit-scrollbar{height:4px}
#eventBar::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:4px}
.ev-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:11px;font-weight:400;transition:all .2s;flex-shrink:0}
.ev-chip:hover{border-color:var(--accent);background:rgba(200,168,78,0.06)}
.ev-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#rocketLauncher{position:fixed;bottom:82px;right:20px;z-index:200}
.rocket-btn{width:48px;height:48px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.rocket-btn:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 4px 20px rgba(200,168,78,0.2)}
.rocket-menu{position:absolute;bottom:56px;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 0;min-width:170px;display:none;backdrop-filter:blur(12px)}
.rocket-menu.show{display:block}
.rocket-menu a{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text);text-decoration:none;font-size:12px;transition:background .15s}
.rocket-menu a:hover{background:rgba(200,168,78,0.08)}
.rocket-menu a i{color:var(--accent);width:16px;text-align:center;font-size:11px}
#toastContainer{position:fixed;top:60px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:8px;font-size:12px;backdrop-filter:blur(12px);opacity:0;transform:translateX(20px);transition:all .3s ease}
.toast.show{opacity:1;transform:translateX(0)}
#controlsHelp{position:fixed;bottom:78px;right:76px;font-size:10px;color:var(--muted);z-index:50;letter-spacing:.5px;line-height:1.6;text-align:right;pointer-events:none}
.atmo-label{position:fixed;pointer-events:none;z-index:80;font-size:10px;font-weight:500;letter-spacing:1px;white-space:nowrap;transition:opacity .15s;text-shadow:0 0 8px rgba(0,0,0,0.9),0 0 16px rgba(0,0,0,0.6)}
.atmo-label::before{content:'';display:inline-block;width:18px;height:1px;background:var(--accent);vertical-align:middle;margin-right:6px;opacity:.6}
@media(max-width:768px){#sidebar{width:180px}#detailPanel{width:280px}header{padding:8px 12px}.logo span{display:none}}
@media(max-width:540px){#sidebar{transform:translateX(-100%)}#detailPanel{width:100%}#controlsHelp{display:none}}
</style>
</head>
<body>
<div id="loader"><div class="spin-ring"></div><p>INITIALIZING</p></div>
<div class="vignette"></div>
<div id="app">
<div id="container"></div>
<header>
<div class="logo">EARTH ANALYSIS<span>Structural System v3.7</span></div>
<div class="hdr-center"><select id="eraSelect"><option value="present">Present Day</option><option value="hadean">Hadean</option><option value="archean">Archean</option><option value="proterozoic">Proterozoic</option><option value="paleozoic">Paleozoic</option><option value="mesozoic">Mesozoic</option><option value="future">Future Projection</option></select></div>
<div class="hdr-right">
<button class="mode-btn active" data-mode="surface">Surface</button>
<button class="mode-btn" data-mode="uv">UV Shield</button>

</header>
<div id="sidebar"></div>
<div id="detailPanel"><button class="dp-close" id="dpClose"><i class="fas fa-times"></i></button><div id="dpContent"></div></div>

</div>
<div id="eventBar"></div>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

/* ================================================================
   DATA
   ================================================================ */
const ATMOS_DATA=[
{name:'Troposphere',innerR:5.0,outerR:5.4,color:[0.53,0.81,0.92],opacity:0.18,range:'0 – 12 km',temp:'15°C (avg surface)',pressure:'1013 hPa',composition:'N₂ 78%, O₂ 21%, Ar 0.9%',density:'1.225 kg/m³',state:'Gas',mass:'5.15 × 10¹⁸ kg',thickness:'~12 km',desc:'The troposphere contains approximately 75% of the total atmospheric mass and is where virtually all weather phenomena occur. Temperature decreases with altitude at roughly 6.5°C per kilometer (lapse rate), driven primarily by radiative cooling from the surface. The tropopause acts as a thermal lid, limiting vertical convection and creating the stable conditions necessary for commercial aviation.',tags:['Weather','Water Vapor','Lapse Rate','Tropopause']},
{name:'Stratosphere',innerR:5.4,outerR:5.8,color:[0.30,0.45,0.88],opacity:0.14,range:'12 – 50 km',temp:'-15°C to -60°C',pressure:'1 – 100 hPa',composition:'O₃ (ozone layer), O₂, N₂',density:'0.001 – 0.3 kg/m³',state:'Gas',mass:'~1 × 10¹⁸ kg',thickness:'~38 km',desc:'The stratosphere houses the critical ozone layer at approximately 20–30 km altitude, absorbing 97–99% of incoming UV-C and UV-B radiation. Temperature increases with altitude due to exothermic ozone formation. This temperature inversion creates extreme atmospheric stability, making the stratosphere the preferred layer for long-distance balloon flights.',tags:['Ozone Layer','UV Absorption','Temperature Inversion','QBO']},
{name:'Mesosphere',innerR:5.8,outerR:6.2,color:[0.28,0.28,0.78],opacity:0.10,range:'50 – 80 km',temp:'-2.5°C to -90°C',pressure:'0.01 – 1 hPa',composition:'N₂, O₂, trace NO',density:'0.0001 – 0.001 kg/m³',state:'Gas',mass:'~1.5 × 10¹⁵ kg',thickness:'~30 km',desc:'The mesosphere is the coldest layer of Earth\'s atmosphere, reaching temperatures as low as -90°C at the mesopause. It is the region where most meteors ablate, producing visible shooting stars. Noctilucent clouds — the highest clouds on Earth — form near the mesopause on ice crystals around 80 km altitude.',tags:['Coldest Layer','Meteor Ablation','Noctilucent Clouds','Mesopause']},
{name:'Thermosphere',innerR:6.2,outerR:7.2,color:[0.45,0.22,0.62],opacity:0.07,range:'80 – 700 km',temp:'500°C to 2000°C',pressure:'10⁻⁷ – 0.01 hPa',composition:'Atomic O, N, He, H',density:'10⁻¹² – 10⁻⁷ kg/m³',state:'Ionized Gas',mass:'~10¹³ kg',thickness:'~620 km',desc:'Despite extreme kinetic temperatures, the thermosphere would feel cold due to near-vacuum density. The ISS orbits at ~408 km within this layer. The ionosphere enables long-distance HF radio propagation. Aurora borealis and australis occur when solar wind particles excite atmospheric atoms at 100–300 km.',tags:['ISS Orbit','Ionosphere','Auroras','Satellite Layer']},
{name:'Exosphere',innerR:7.2,outerR:9.5,color:[0.22,0.12,0.35],opacity:0.04,range:'700 – 10,000 km',temp:'>1000°C (kinetic)',pressure:'~10⁻¹² hPa',composition:'H, He, sparse O, N',density:'< 10⁻¹² kg/m³',state:'Near-Vacuum',mass:'Negligible',thickness:'~9,300 km',desc:'The outermost layer where atmospheric particles are so sparse that collisions are virtually nonexistent. Molecules follow ballistic trajectories and can escape Earth\'s gravity entirely. The geocorona — a faint glow of scattered solar Lyman-alpha radiation by exospheric hydrogen — extends to at least 100,000 km.',tags:['Atmospheric Escape','Geocorona','Ballistic Trajectories','Exobase']}
];
const INT_DATA=[
{name:'Inner Core',radius:1.15,color:'#FFD700',range:'0 – 1,220 km',temp:'~5,400°C',pressure:'330 – 365 GPa',composition:'Iron-Nickel alloy (Fe + ~5-10% Ni)',density:'12,800 – 13,100 kg/m³',state:'Solid',mass:'~9.4 × 10²² kg (1.7% of Earth)',thickness:'1,220 km',desc:'The inner core is a solid sphere of iron-nickel alloy, despite temperatures exceeding 5,400°C — kept solid by immense pressure (~360 GPa). Seismic P-wave velocities indicate anisotropy, with faster propagation along the rotation axis. It grows by ~1 mm/year as the outer core slowly solidifies, releasing latent heat that drives the geodynamo.',tags:['Solid Iron','Anisotropic','Super-Rotation','Geodynamo Source']},
{name:'Outer Core',radius:2.5,color:'#E86800',range:'1,220 – 3,480 km',temp:'~4,400°C',pressure:'135 – 330 GPa',composition:'Liquid Fe-Ni with light elements (S, O, Si)',density:'9,900 – 12,200 kg/m³',state:'Liquid',mass:'~1.8 × 10²⁴ kg (30.8% of Earth)',thickness:'2,260 km',desc:'A vigorously convecting liquid iron alloy generating Earth\'s magnetic field through the geodynamo mechanism — convective motion of electrically conductive fluid coupled with Coriolis forces. Convective velocities estimated at ~20 km/year. Light elements expelled during inner core solidization help drive convection.',tags:['Liquid Metal','Geodynamo','Convection','Magnetic Field']},
{name:'Lower Mantle',radius:3.7,color:'#A03020',range:'3,480 – 5,600 km',temp:'~1,900 – 3,700°C',pressure:'24 – 135 GPa',composition:'Bridgmanite (MgSiO₃), ferropericlase',density:'4,400 – 5,600 kg/m³',state:'Solid (highly viscous)',mass:'~3.5 × 10²⁴ kg',thickness:'2,120 km',desc:'Comprises the majority of Earth\'s volume. Seismic tomography reveals two Large Low-Shear-Velocity Provinces (LLSVPs) beneath Africa and the Pacific — massive structures potentially billions of years old. The D″ layer at its base shows anisotropy and may represent a thermochemical boundary layer.',tags:['Bridgmanite','LLSVPs','D″ Layer','Post-Perovskite']},
{name:'Upper Mantle',radius:4.45,color:'#705830',range:'5,600 – 6,340 km',temp:'~500 – 1,900°C',pressure:'1.5 – 24 GPa',composition:'Olivine, pyroxene, garnet',density:'3,400 – 4,400 kg/m³',state:'Solid (ductile, convecting)',mass:'~1.0 × 10²⁴ kg',thickness:'740 km',desc:'Contains the asthenosphere (~100–350 km), a partially molten ductile layer permitting plate tectonic motion. The transition zone at 410–660 km features mineral phase transitions creating seismic discontinuities. Mantle convection drives mid-ocean ridge spreading and subduction.',tags:['Asthenosphere','Plate Tectonics','Transition Zone','Melt Generation']},
{name:'Crust',radius:5.0,color:'#4A3820',range:'5 – 70 km depth',temp:'Surface to ~500°C (base)',pressure:'0 – 1.5 GPa',composition:'Silicate rocks (basalt, granite)',density:'2,700 – 3,000 kg/m³',state:'Solid (brittle)',mass:'~2.8 × 10²² kg (0.5% of Earth)',thickness:'5–70 km',desc:'Divided into oceanic crust (~5–10 km, basaltic) and continental crust (~30–70 km, granitic). The Mohorovičić discontinuity marks the crust-mantle boundary. Contains the oldest known rocks (Acasta Gneiss, 4.03 Ga). Represents less than 0.5% of Earth\'s total mass.',tags:['Moho','Oceanic vs Continental','Differentiated','Accessible Layer']}
];
const EVENTS=[
{name:'Earth Formation',date:'4.54 BYA',lat:0,lng:0,color:'#FF6B35',cat:'Formation',desc:'Earth accreted from the solar nebula through gravitational accumulation of planetesimals over ~10–100 million years. The Giant Impact hypothesis proposes a Mars-sized body (Theia) collided with proto-Earth, ejecting debris that formed the Moon.'},
{name:'First Oceans',date:'4.4 BYA',lat:15,lng:-40,color:'#3498DB',cat:'Ocean',desc:'Water delivered by cometary and asteroidal bombardment condensed to form the first oceans. Zircon crystals from Jack Hills, Australia suggest liquid water existed within 150 million years of Earth formation.'},
{name:'Late Heavy Bombardment',date:'3.9 BYA',lat:-20,lng:30,color:'#E74C3C',cat:'Impact',desc:'A spike in asteroid impacts reshaped the inner planets. Lunar samples show most large craters formed during this ~200 million year window. Earth experienced even more impacts due to its larger cross-section.'},
{name:'First Life',date:'3.8 BYA',lat:25,lng:35,color:'#27AE60',cat:'Biology',desc:'Earliest evidence from isotopically light carbon in Greenland\'s Isua supracrustal belt suggests microbial activity. First organisms were likely chemoautotrophic, deriving energy from chemical reactions.'},
{name:'Great Oxidation',date:'2.4 BYA',lat:-5,lng:28,color:'#F39C12',cat:'Atmosphere',desc:'Cyanobacteria flooded the atmosphere with oxygen via oxygenic photosynthesis. This oxidized dissolved iron in oceans (forming banded iron formations) and was catastrophically toxic to most anaerobic life.'},
{name:'Snowball Earth',date:'720 MYA',lat:-55,lng:170,color:'#85C1E9',cat:'Climate',desc:'Extreme glaciation with ice extending to the equator — possibly multiple times during the Cryogenian. Recovery required volcanic CO₂ accumulation over millions of years.'},
{name:'Cambrian Explosion',date:'541 MYA',lat:30,lng:105,color:'#2ECC71',cat:'Biology',desc:'Over ~25 million years, nearly all major animal phyla appeared. The Chengjiang and Burgess Shale lagerstätten preserve extraordinary detail of this evolutionary radiation.'},
{name:'First Land Plants',date:'470 MYA',lat:55,lng:10,color:'#1ABC9C',cat:'Biology',desc:'Earliest land plants colonized coastal environments during the Ordovician. Their spread altered atmospheric CO₂, weathering rates, and soil formation — contributing to late Paleozoic glaciation.'},
{name:'Permian Extinction',date:'252 MYA',lat:-30,lng:65,color:'#8E44AD',cat:'Extinction',desc:'The "Great Dying" eliminated ~96% of marine and ~70% of land species. Caused by Siberian Traps volcanism releasing CO₂, triggering ocean acidification, anoxia, and possible methane destabilization.'},
{name:'Chicxulub Impact',date:'66 MYA',lat:21,lng:-90,color:'#C0392B',cat:'Impact',desc:'A 10–15 km asteroid struck the Yucatán at ~20 km/s, releasing energy equivalent to 100 million megatons TNT. Combined with Deccan Traps volcanism, it caused the K-Pg extinction ending non-avian dinosaurs.'},
{name:'First Hominins',date:'7 MYA',lat:5,lng:35,color:'#D4A03C',cat:'Evolution',desc:'Sahelanthropus tchadensis represents one of the earliest known hominins. Bipedal locomotion evolved in African forests long before expansion into savanna habitats.'},
{name:'Toba Eruption',date:'74 KYA',lat:2,lng:98,color:'#E67E22',cat:'Volcanism',desc:'Lake Toba produced the largest Quaternary eruption (~2,800 km³). The volcanic winter hypothesis suggests a human bottleneck to as few as 2,000–10,000 individuals, though this remains debated.'},
{name:'Agriculture',date:'10 KYA',lat:35,lng:45,color:'#F1C40F',cat:'Civilization',desc:'The Neolithic Revolution began in the Fertile Crescent with wheat, barley cultivation and animal domestication. This fundamentally transformed human society, enabling permanent settlements and complex civilizations.'},
{name:'Pyramids of Giza',date:'4.5 KYA',lat:30,lng:31,color:'#BDC3C7',cat:'Civilization',desc:'The Great Pyramid contains ~2.3 million limestone blocks averaging 2.5 tons each. Its base is level to within 2.1 cm across 230 meters — precision unmatched until modern surveying.'},

/* ================================================================
   CLOUD TEXTURE
   ================================================================ */
function makeCloudTexture(){
  const W=2048,H=1024;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');x.clearRect(0,0,W,H);
  // Equatorial and mid-latitude cloud bands
  for(let band=0;band<5;band++){
    const by=200+band*160+(Math.random()-0.5)*40;
    for(let i=0;i<60;i++){
      const bx=Math.random()*W;const br=15+Math.random()*45;
      const g=x.createRadialGradient(bx,by+(Math.random()-0.5)*50,0,bx,by+(Math.random()-0.5)*50,br);
      g.addColorStop(0,'rgba(255,255,255,0.22)');g.addColorStop(0.5,'rgba(255,255,255,0.08)');g.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=g;x.beginPath();x.arc(bx,by+(Math.random()-0.5)*50,br,0,Math.PI*2);x.fill();
    }
  }
  // Random scattered clouds
  for(let i=0;i<150;i++){
    const bx=Math.random()*W;const by=50+Math.random()*(H-100);const br=8+Math.random()*35;
    const g=x.createRadialGradient(bx,by,0,bx,by,br);
    g.addColorStop(0,'rgba(255,255,255,0.18)');g.addColorStop(0.6,'rgba(255,255,255,0.05)');g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g;x.beginPath();x.arc(bx,by,br,0,Math.PI*2);x.fill();
  }
  // Storm systems (larger spiral-like clusters)
  for(let s=0;s<6;s++){
    const sx=Math.random()*W;const sy=150+Math.random()*(H-300);
    for(let j=0;j<20;j++){
      const a=j/20*Math.PI*4;const r=j*3;
      const px=sx+Math.cos(a)*r;const py=sy+Math.sin(a)*r*0.6;
      const br=10+Math.random()*15;
      const g=x.createRadialGradient(px,py,0,px,py,br);
      g.addColorStop(0,'rgba(255,255,255,0.2)');g.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=g;x.beginPath();x.arc(px,py,br,0,Math.PI*2);x.fill();
    }
  }
  return new THREE.CanvasTexture(c);
}

   ================================================================ */
function makeMoonTexture(){
  const c=document.createElement('canvas');c.width=512;c.height=256;
  const x=c.getContext('2d');
  // Base gray with subtle variation
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0,'#9a9a9a');g.addColorStop(0.5,'#8a8a8a');g.addColorStop(1,'#9a9a9a');
  x.fillStyle=g;x.fillRect(0,0,512,256);
  // Maria
  [[200,120,70,50],[300,100,50,40],[150,150,40,35],[350,140,55,45],[250,80,30,25],[180,90,25,20],[320,80,20,18]].forEach(m=>{
    const rg=x.createRadialGradient(m[0],m[1],0,m[0],m[1],Math.max(m[2],m[3]));
    rg.addColorStop(0,'#5a5a5a');rg.addColorStop(0.7,'#6a6a6a');rg.addColorStop(1,'rgba(138,138,138,0)');
    x.fillStyle=rg;x.beginPath();x.ellipse(m[0],m[1],m[2],m[3],0,0,Math.PI*2);x.fill();
  });
  // Craters
  for(let i=0;i<250;i++){
    const cx_=Math.random()*512;const cy_=Math.random()*256;const cr=0.5+Math.random()*4;
    x.strokeStyle=`rgba(90,90,90,${0.15+Math.random()*0.25})`;x.lineWidth=0.5;
    x.beginPath();x.arc(cx_,cy_,cr,0,Math.PI*2);x.stroke();
    if(cr>2){x.fillStyle=`rgba(110,110,110,0.1)`;x.beginPath();x.arc(cx_,cy_,cr*0.7,0,Math.PI*2);x.fill();}
  }
  const id=x.getImageData(0,0,512,256);
  for(let i=0;i<id.data.length;i+=4){const n=(Math.random()-0.5)*12;id.data[i]=Math.max(0,Math.min(255,id.data[i]+n));id.data[i+1]=Math.max(0,Math.min(255,id.data[i+1]+n));id.data[i+2]=Math.max(0,Math.min(255,id.data[i+2]+n));}
  x.putImageData(id,0,0);
  return new THREE.CanvasTexture(c);
}

let starMatRef;
function createStars(){
  const count=10000;
  const pos=new Float32Array(count*3);
  const sizes=new Float32Array(count);
  const phases=new Float32Array(count);
  const colors=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r=250+Math.random()*750;
    const theta=Math.random()*Math.PI*2;
    let phi=Math.acos(2*Math.random()-1);
    // Milky way: concentrate stars in a band
    if(Math.random()<0.25){
      phi=Math.PI/2+(Math.random()-0.5)*0.5;
      theta=Math.random()*Math.PI*2;
    }
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    sizes[i]=0.3+Math.random()*2.2;
    phases[i]=Math.random()*Math.PI*2;
    // Star color variation
    const t=Math.random();
    if(t<0.1){colors[i*3]=1;colors[i*3+1]=0.85;colors[i*3+2]=0.7;} // warm
    else if(t<0.2){colors[i*3]=0.75;colors[i*3+1]=0.85;colors[i*3+2]=1;} // blue
    else{colors[i*3]=1;colors[i*3+1]=0.98;colors[i*3+2]=0.94;} // white
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aSize',new THREE.BufferAttribute(sizes,1));
  geo.setAttribute('aPhase',new THREE.BufferAttribute(phases,1));
  geo.setAttribute('aColor',new THREE.BufferAttribute(colors,3));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`attribute float aSize;attribute float aPhase;attribute vec3 aColor;uniform float uTime;varying float vAlpha;varying vec3 vColor;void main(){vAlpha=0.35+0.65*sin(uTime*1.2+aPhase);vColor=aColor;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=aSize*(160.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying float vAlpha;varying vec3 vColor;void main(){float d=length(gl_PointCoord-0.5);if(d>0.5)discard;float a=smoothstep(0.5,0.02,d)*vAlpha;gl_FragColor=vec4(vColor,a);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  const pts=new THREE.Points(geo,mat);pts.renderOrder=0;scene.add(pts);
  starMatRef=mat;
}

    uniforms:{
      nightMap:{value:nightTex},
      sunDir:{value:sunDir.clone()},
      clipPlane:{value:new THREE.Vector4(-1,0,0,20)}
    },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      void main(){
        vUv=uv;
        vec4 wp=modelMatrix*vec4(position,1.0);
        vWorldPos=wp.xyz;
        vWorldNormal=normalize((modelMatrix*vec4(normal,0.0)).xyz);
        gl_Position=projectionMatrix*viewMatrix*wp;
      }
    `,
    fragmentShader:`
      uniform sampler2D nightMap;
      uniform vec3 sunDir;
      uniform vec4 clipPlane;
      varying vec2 vUv;
      varying vec3 vWorldPos;
      varying vec3 vWorldNormal;
      void main(){
        if(dot(clipPlane.xyz,vWorldPos)+clipPlane.w<0.0)discard;
        vec3 N=normalize(vWorldNormal);
        float NdotL=dot(N,sunDir);
        float nightF=smoothstep(0.05,-0.25,NdotL);
        vec3 nc=texture2D(nightMap,vUv).rgb;
        gl_FragColor=vec4(nc*nightF*2.2,nightF*0.95);
      }
    `,
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    side:THREE.FrontSide
  });

  nightMesh.renderOrder=3;scene.add(nightMesh);
}

/* ================================================================

   ================================================================ */
function createAtmosphere(){
  // Thin blue limb line
  const thinMat=new THREE.ShaderMaterial({
    uniforms:{sunDir:{value:sunDir.clone()}},
    vertexShader:`
      varying vec3 vN;varying vec3 vV;varying vec3 vWN;
      void main(){
        vN=normalize(normalMatrix*normal);
        vWN=normalize((modelMatrix*vec4(normal,0.0)).xyz);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        vV=normalize(-mv.xyz);
        gl_Position=projectionMatrix*mv;
      }
    `,
    fragmentShader:`
      uniform vec3 sunDir;
      varying vec3 vN;varying vec3 vV;varying vec3 vWN;
      void main(){
        float f=1.0-abs(dot(vN,vV));
        float dayF=smoothstep(-0.1,0.5,dot(vWN,sunDir));
        float termF=1.0-abs(dot(vWN,sunDir));termF=clamp(termF*2.0,0.0,1.0);
        float thin=pow(f,10.0)*3.0;
        float wide=pow(f,3.5)*0.25;
        vec3 dayC=vec3(0.3,0.55,1.0);
        vec3 setC=vec3(1.0,0.4,0.12);
        vec3 ac=mix(dayC,setC,termF*0.4);
        float a=(thin+wide)*(0.2+0.8*dayF);
        gl_FragColor=vec4(ac,a);
      }
    `,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide
  });
  const thinGlow=new THREE.Mesh(new THREE.SphereGeometry(5.08,64,48),thinMat);
  thinGlow.renderOrder=10;scene.add(thinGlow);

  // Wider subtle halo
  const wideMat=new THREE.ShaderMaterial({
    uniforms:{sunDir:{value:sunDir.clone()}},
    vertexShader:`
      varying vec3 vN;varying vec3 vV;varying vec3 vWN;
      void main(){
        vN=normalize(normalMatrix*normal);
        vWN=normalize((modelMatrix*vec4(normal,0.0)).xyz);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        vV=normalize(-mv.xyz);
        gl_Position=projectionMatrix*mv;
      }
    `,
    fragmentShader:`
      uniform vec3 sunDir;
      varying vec3 vN;varying vec3 vV;varying vec3 vWN;
      void main(){
        float f=1.0-abs(dot(vN,vV));
        float dayF=smoothstep(-0.1,0.5,dot(vWN,sunDir));
        float a=pow(f,4.0)*0.08*dayF;
        gl_FragColor=vec4(0.25,0.5,1.0,a);
      }
    `,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide
  });
  const wideGlow=new THREE.Mesh(new THREE.SphereGeometry(5.5,48,32),wideMat);
  wideGlow.renderOrder=11;scene.add(wideGlow);
}

      vertexShader:`varying vec3 vN;varying vec3 vV;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`,
      fragmentShader:`uniform vec3 uColor;uniform float uOpacity;varying vec3 vN;varying vec3 vV;void main(){float f=1.0-abs(dot(vN,vV));f=pow(f,2.5);if(gl_FrontFacing){gl_FragColor=vec4(uColor,f*uOpacity*2.8);}else{float h=pow(f,1.2);gl_FragColor=vec4(uColor,(0.12+h*0.7)*uOpacity*3.5);}}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide
    });
    const m=new THREE.Mesh(new THREE.SphereGeometry(d.outerR,48,48),mat);
    m.renderOrder=12+i;scene.add(m);atmoMeshes.push(m);atmoMats.push(mat);

/* ================================================================
   INTERNAL LAYERS (Cross-Section)
   ================================================================ */
const intMeshes=[],intDiscs=[],intRingOutlines=[];
const fieldLineGroup=new THREE.Group(),convectionGroup=new THREE.Group();
function createInternalLayers(){
  INT_DATA.forEach((d,i)=>{
    const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(d.color),transparent:true,opacity:0.85,side:THREE.DoubleSide,depthWrite:false,clippingPlanes:[clipPlane],roughness:0.6});
    const m=new THREE.Mesh(new THREE.SphereGeometry(d.radius,48,48),mat);
    m.renderOrder=15+i;m.visible=false;scene.add(m);intMeshes.push(m);
    // Cross-section disc
    const discGeo=new THREE.CircleGeometry(d.radius,64);
    const discMat=new THREE.MeshBasicMaterial({color:new THREE.Color(d.color),side:THREE.DoubleSide,depthTest:false,transparent:true,opacity:0.9,depthWrite:false});
    const disc=new THREE.Mesh(discGeo,discMat);
    disc.position.x=-(0.002*(i+1));disc.rotation.y=Math.PI/2;
    disc.renderOrder=20+i;disc.visible=false;scene.add(disc);intDiscs.push(disc);
    // Ring outline
    const ringGeo=new THREE.RingGeometry(Math.max(0.01,d.radius-0.01),d.radius+0.01,64);
    const ringMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.18,side:THREE.DoubleSide,depthWrite:false,clippingPlanes:[clipPlane]});
    const ring=new THREE.Mesh(ringGeo,ringMat);ring.renderOrder=14;ring.visible=false;scene.add(ring);intRingOutlines.push(ring);
  });
  // Convection currents in outer core
  for(let c=0;c<3;c++){
    const pts=[];const sa=c*Math.PI*2/3;
    for(let j=0;j<=60;j++){
      const t=j/60;const a=sa+t*Math.PI*2;const r=1.3+0.5*Math.sin(t*Math.PI*4);
      pts.push(new THREE.Vector3(-Math.cos(a)*r,(t-0.5)*2.2,Math.sin(a)*r));
    }
    const curve=new THREE.CatmullRomCurve3(pts);
    const tubeGeo=new THREE.TubeGeometry(curve,80,0.02,6,false);
    const tubeMat=new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.25,depthWrite:false,clippingPlanes:[clipPlane]});
    convectionGroup.add(new THREE.Mesh(tubeGeo,tubeMat));
  }
  scene.add(convectionGroup);
  // Magnetic dipole field lines
  [2.5,4.2].forEach(L=>{
    [0,Math.PI].forEach(phi=>{
      const pts=[];
      for(let j=0;j<=80;j++){
        const theta=j/80*Math.PI;const r=L*Math.sin(theta)*Math.sin(theta);
        pts.push(new THREE.Vector3(r*Math.sin(theta)*Math.cos(phi),r*Math.cos(theta),r*Math.sin(theta)*Math.sin(phi)));
      }
      if(pts.length>1){
        const curve=new THREE.CatmullRomCurve3(pts);
        const tubeGeo=new THREE.TubeGeometry(curve,60,0.012,4,false);
        const tubeMat=new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.15,depthWrite:false,clippingPlanes:[clipPlane]});
        fieldLineGroup.add(new THREE.Mesh(tubeGeo,tubeMat));
      }
    });
  });
  scene.add(fieldLineGroup);fieldLineGroup.visible=false;
}

/* ================================================================
   UV SHIELD SYSTEM
   ================================================================ */
let uvSpawnTimer=0;
const UV_TYPES=[
  {type:'C',color:0x9B59B6,blockAt:5.6,prob:0.45},
  {type:'B',color:0x2980B9,blockAt:5.6,prob:0.35},
  {type:'A',color:0x1ABC9C,blockAt:5.05,prob:0.20}
];
function spawnUVRay(){
  if(uvRays.length>=35)return;
  const r=Math.random();let cumul=0,sel=UV_TYPES[0];
  for(const t of UV_TYPES){cumul+=t.prob;if(r<cumul){sel=t;break;}}
  const sPos=new THREE.Vector3(60,15,-40);
  const spread=new THREE.Vector3((Math.random()-0.5)*1.2,(Math.random()-0.5)*1.2,(Math.random()-0.5)*1.2);
  sPos.add(spread);
  const ePos=sunDir.clone().multiplyScalar(-sel.blockAt);
  const dir=ePos.clone().sub(sPos).normalize();
  const len=sPos.distanceTo(ePos);
  const cylGeo=new THREE.CylinderGeometry(0.006,0.006,1,4);
  const cylMat=new THREE.MeshBasicMaterial({color:sel.color,transparent:true,opacity:0.65,blending:THREE.AdditiveBlending,depthWrite:false});
  const cyl=new THREE.Mesh(cylGeo,cylMat);
  const headGeo=new THREE.SphereGeometry(0.035,8,8);
  const headMat=new THREE.MeshBasicMaterial({color:sel.color,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending,depthWrite:false});
  const head=new THREE.Mesh(headGeo,headMat);
  scene.add(cyl);scene.add(head);
  uvRays.push({cyl,head,startPos:sPos,dir,len,progress:0,speed:7+Math.random()*4,type:sel});
}
function updateUVRays(dt){
  for(let i=uvRays.length-1;i>=0;i--){
    const ray=uvRays[i];ray.progress+=ray.speed*dt;
    if(ray.progress>=ray.len){
      const hitPos=ray.startPos.clone().add(ray.dir.clone().multiplyScalar(ray.len));
      if(ray.type.type==='A')addFlash(hitPos,0xff3333);
      else{addFlash(hitPos,0x33ff55);addRing(hitPos);}
      scene.remove(ray.cyl);scene.remove(ray.head);ray.cyl.geometry.dispose();ray.head.geometry.dispose();
      uvRays.splice(i,1);continue;
    }
    const pos=ray.startPos.clone().add(ray.dir.clone().multiplyScalar(ray.progress));
    ray.head.position.copy(pos);
    ray.cyl.position.copy(ray.startPos.clone().add(ray.dir.clone().multiplyScalar(ray.progress/2)));
    ray.cyl.scale.y=ray.progress;ray.cyl.lookAt(pos);ray.cyl.rotateX(Math.PI/2);
  }
}
function addFlash(pos,color){
  const mat=new THREE.SpriteMaterial({map:spriteTex,color:new THREE.Color(color),blending:THREE.AdditiveBlending,transparent:true,depthWrite:false});
  const s=new THREE.Sprite(mat);s.position.copy(pos);s.scale.set(0.08,0.08,0.08);s.renderOrder=60;scene.add(s);
  flashEffects.push({sprite:s,life:0,maxLife:0.55,type:'flash'});
}
function addRing(pos){
  const geo=new THREE.RingGeometry(0.01,0.04,32);
  const mat=new THREE.MeshBasicMaterial({color:0x33ff55,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat);m.position.copy(pos);m.lookAt(new THREE.Vector3(60,15,-40));m.renderOrder=60;scene.add(m);
  flashEffects.push({mesh:m,life:0,maxLife:0.7,type:'ring'});
}
function updateFlashes(dt){
  for(let i=flashEffects.length-1;i>=0;i--){
    const f=flashEffects[i];f.life+=dt;const t=f.life/f.maxLife;
    if(t>=1){
      if(f.type==='flash'){scene.remove(f.sprite);f.sprite.material.dispose();}
      else{scene.remove(f.mesh);f.mesh.geometry.dispose();f.mesh.material.dispose();}
      flashEffects.splice(i,1);continue;
    }
    if(f.type==='flash'){const s=0.08+t*1.2;f.sprite.scale.set(s,s,s);f.sprite.material.opacity=1-t;}
    else{const s=1+t*5;f.mesh.scale.set(s,s,s);f.mesh.material.opacity=(1-t)*0.5;}
  }
}

  intDiscs.forEach(d=>d.visible=isDeep);

  fieldLineGroup.visible=isDeep;

  eventObjects.forEach(e=>{e.sprite.visible=!isDeep;e.dot.visible=!isDeep;});

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  controls.update();

  // Stars twinkle
  if(starMatRef)starMatRef.uniforms.uTime.value=t;

  // Earth rotation
  if(earthMesh)earthMesh.rotation.y+=0.0008;
  if(cloudMesh)cloudMesh.rotation.y+=0.001;
  if(nightMesh)nightMesh.rotation.y=earthMesh?earthMesh.rotation.y:0;

  // Moon orbit
  if(moonMesh){
    const ma=t*0.12;const mr=9;
    moonMesh.position.set(Math.cos(ma)*mr,Math.sin(0.09)*mr*0.3,Math.sin(ma)*mr);
    moonMesh.rotation.y=t*0.15;
  }

  // Clipping plane lerp
  clipPlane.constant+=(clipTarget-clipPlane.constant)*Math.min(1,dt*3);
  // Update night shader clip plane
  if(nightMat)nightMat.uniforms.clipPlane.value.set(clipPlane.normal.x,clipPlane.normal.y,clipPlane.normal.z,clipPlane.constant);
  // Update sun direction in night shader
  if(nightMat)nightMat.uniforms.sunDir.value.copy(sunDir);

  // Light cones
  const showCones=currentMode==='uv';
  lightCones.forEach((lc,i)=>{
    const target=showCones?0.06+0.03*Math.sin(t*2+i):0;
    lc.mat.opacity+=(target-lc.mat.opacity)*Math.min(1,dt*5);
    lc.mesh.visible=lc.mat.opacity>0.001;
  });

  // Ozone pulse
  if(ozoneMesh&&ozoneMesh.visible)ozoneMesh.material.uniforms.uOpacity.value=0.12+0.06*Math.sin(t*1.5);

  // UV rays
  if(currentMode==='uv'){
    uvSpawnTimer+=dt;if(uvSpawnTimer>0.07){uvSpawnTimer=0;spawnUVRay();}
    updateUVRays(dt);updateFlashes(dt);
  }

  // Event marker pulse
  eventObjects.forEach((ev,i)=>{
    const s=ev.baseScale*(0.8+0.3*Math.sin(t*2+i*0.7));
    ev.sprite.scale.set(s,s,s);
    ev.sprite.material.opacity=0.45+0.4*Math.sin(t*2+i*0.7);
  });

  // Era lerping
  if(earthMat){
    lerpT.color.lerp(lerpTarget.color,dt*2);
    lerpT.emissive.lerp(lerpTarget.emissive,dt*2);
    lerpT.emI+=(lerpTarget.emI-lerpT.emI)*dt*2;
    earthMat.color.copy(lerpT.color);
    earthMat.emissive.copy(lerpT.emissive);
    earthMat.emissiveIntensity=lerpT.emI;
  }
  if(cloudMat){lerpT.cloudOp+=(lerpTarget.cloudOp-lerpT.cloudOp)*dt*2;cloudMat.opacity=lerpT.cloudOp;}
  for(let i=0;i<5;i++){lerpT.atmoOp[i]+=(lerpTarget.atmoOp[i]-lerpT.atmoOp[i])*dt*2;if(atmoMats[i])atmoMats[i].uniforms.uOpacity.value=lerpT.atmoOp[i];}

  // Convection & field line rotation
  if(convectionGroup.visible)convectionGroup.rotation.y+=dt*0.12;
  if(fieldLineGroup.visible)fieldLineGroup.rotation.y+=dt*0.06;

  // Labels
  updateLabels();

  renderer.render(scene,camera);
}

/* ================================================================
   RESIZE
   ================================================================ */
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ================================================================
   INIT
   ================================================================ */
async function init(){
  await createEarth();
  setTimeout(()=>{
    document.getElementById('loader').style.opacity='0';
    document.getElementById('app').style.opacity='1';
    setTimeout(()=>document.getElementById('loader').style.display='none',800);
  },1200);
  animate();
}
init();
</script>
